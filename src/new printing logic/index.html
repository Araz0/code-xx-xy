<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printable User Data Lines</title>
    <style>
        :root {
            --page-bg: #f1f1f1;
            --line-border: #d6d6d6;
            --text: #2f2f2f;
            --line-border-width: 1px;
            --screen-max-width: 1100px;
            --print-page-padding: 14px 10px;
            --row-height: 50px;
            --row-gap: 4px;
            --bar-width: 5px;
            --bar-top-offset: 3px;
            --scale-font-size: 10px;
            --default-line-color: #9f9f9f;
            --alt-a-color: #51b7de;
            --alt-b-color: #0e5ea6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: var(--text);
            background: #ffffff;
        }

        .controls {
            max-width: var(--screen-max-width);
            margin: 24px auto 12px;
            padding: 0 12px;
        }

        .controls h1 {
            margin: 0 0 8px;
            font-size: 20px;
        }

        .controls p {
            margin: 0 0 10px;
            font-size: 14px;
        }

        .controls textarea {
            width: 100%;
            min-height: 170px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            resize: vertical;
        }

        .actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        button {
            border: 1px solid #999999;
            background: #ffffff;
            color: #222222;
            border-radius: 6px;
            padding: 8px 14px;
            cursor: pointer;
        }

        button:hover {
            background: #f4f4f4;
        }

        .print-page {
            width: 100%;
            max-width: var(--screen-max-width);
            margin: 0 auto 24px;
            background: var(--page-bg);
            padding: var(--print-page-padding);
        }

        .line-row {
            position: relative;
            height: var(--row-height);
            margin: 0;
            border-top: var(--line-border-width) solid var(--line-border);
            border-bottom: var(--line-border-width) solid var(--line-border);
            overflow: visible;
        }

        .scale {
            position: absolute;
            top: var(--bar-top-offset);
            font-size: var(--scale-font-size);
            color: #6f6f6f;
            z-index: 2;
            user-select: none;
        }

        .scale.left {
            left: 4px;
        }

        .scale.right {
            right: 4px;
        }

        .bars-layer {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
        }

        .point-bar {
            position: absolute;
            top: var(--bar-top-offset);
            width: var(--bar-width);
            height: calc(var(--row-height) - (var(--bar-top-offset) * 2));
            border-radius: 1px;
            opacity: 0.95;
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: var(--line-color, var(--default-line-color));
        }

        .point-bar.alt-a { background: var(--alt-a-color) !important; }
        .point-bar.alt-b { background: var(--alt-b-color) !important; }

        .correct-answer-label {
            position: absolute;
            top: -16px;
            width: 24px;
            text-align: center;
            font-size: 9px;
            color: #999999;
            font-weight: bold;
            user-select: none;
            z-index: 10;
        }

        .color-palette {
            width: 100%;
            max-width: var(--screen-max-width);
            margin: 24px auto;
            padding: 0 12px;
        }

        .color-palette h2 {
            margin: 0 0 12px;
            font-size: 16px;
            color: #333333;
        }

        .color-legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .color-swatch {
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .color-bar {
            height: 40px;
            display: flex;
        }

        .color-bar-section {
            flex: 1;
        }

        .color-info {
            padding: 8px;
            font-size: 11px;
            background: #f9f9f9;
        }

        .color-info .color-name {
            font-weight: bold;
            margin-bottom: 3px;
            color: #333;
        }

        .color-info .color-values {
            color: #666;
            font-family: monospace;
            line-height: 1.3;
        }

        @media print {
            .color-palette {
                display: none;
            }

            * {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            body {
                background: #ffffff;
            }

            .controls {
                display: none;
            }

            .correct-answer-label {
                display: block;
            }

            .print-page {
                margin: 0;
                max-width: none;
                width: 100%;
                padding: 0;
                background: var(--page-bg);
            }
        }
        
    </style>
    <style id="dynamicPrintStyle"></style>
</head>
<body>
    <section class="controls">
        <h1>Print User Data Lines</h1>
        <p>Paste JSON in the format <strong>{"lines":[{"points":[0..100]}...]}</strong> with 13 lines.</p>
        <textarea id="jsonInput"></textarea>
        <div class="actions">
            <button id="loadFakeBtn" type="button">Load Fake Data</button>
            <button id="randomizeBtn" type="button">Randomize Data</button>
            <button id="printBtn" type="button">Print Page</button>
        </div>
    </section>

    <section class="color-palette">
        <h2>Color Palette & Gradients</h2>
        <div class="color-legend" id="colorLegend"></div>
    </section>

    <main id="printPage" class="print-page" aria-label="Printable chart"></main>

    <script type="module" src="./index-init.js"></script>
</body>
</html>
